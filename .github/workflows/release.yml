# Opens / updates a "Version Packages" PR whenever changesets land on `main`.
#
# Why GitHub Actions when this repo's CI is Azure Pipelines?
#   - changesets/action does the version-PR loop in ~10 lines and handles the
#     GitHub API auth for free via GITHUB_TOKEN.
#   - Publish stays on Azure (see azure-pipelines.yml) so credentials for the
#     Azure Artifacts feed don't leak into GitHub Actions secrets.
#
# Flow:
#   1. Author lands a feature PR that includes a `.changeset/*.md` file.
#   2. On merge to `main`, this workflow opens/updates a "Version Packages" PR
#      that consumes pending changesets, bumps versions, and writes CHANGELOGs.
#   3. When that PR is merged, Azure Pipelines' `main` trigger fires and
#      `pnpm changeset publish` ships the new versions.

name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Open Version Packages PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
